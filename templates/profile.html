{% extends "base.html" %}

{% block title %}프로필 수정 - CANJIA{% endblock %}

{% block content %}
<section style="background: var(--light-bg); padding: 3rem 0;">
    <div class="container">
        <div style="max-width: 700px; margin: 0 auto;">
            <div class="card">
                <h2 style="color: var(--primary-color); margin-bottom: 2rem;">프로필 수정</h2>
                
                <form method="POST" enctype="multipart/form-data">
                    <div class="form-group" style="text-align: center; margin-bottom: 2rem;">
                        {% if user.profile_image %}
                            <img src="{{ user.profile_image }}" alt="{{ user.name }}" class="profile-image" style="margin-bottom: 1rem;">
                        {% else %}
                            <div class="profile-image" style="background: var(--primary-color); color: white; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin-bottom: 1rem;">
                                👤
                            </div>
                        {% endif %}
                        <input type="file" id="profile_image" name="profile_image" accept="image/*">
                    </div>
                    
                    <div class="form-group">
                        <label for="name">이름</label>
                        <input type="text" id="name" name="name" value="{{ user.name }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">이메일 (변경 불가)</label>
                        <input type="email" id="email" name="email" value="{{ user.email }}" disabled>
                    </div>
                    
                    <div class="form-group">
                        <label for="bio">소개글</label>
                        <textarea id="bio" name="bio" placeholder="자신에 대해 소개해주세요...">{{ user.bio or '' }}</textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>관심 분야 (선택)</label>
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
                            {% for field in fields %}
                                <label style="display: flex; gap: 0.5rem; align-items: center; font-weight: normal;">
                                    <input type="checkbox" name="fields" value="{{ field }}" 
                                        {% if user.fields and field in user.fields %}checked{% endif %}>
                                    {{ field }}
                                </label>
                            {% endfor %}
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                        <button type="submit" class="btn btn-primary" style="flex: 1;">저장</button>
                        <a href="/auth/profile" class="btn btn-secondary" style="flex: 1; text-align: center;">취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
