{% extends "base.html" %}

{% block title %}회원가입 - CANJIA{% endblock %}

{% block content %}
<section style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 80vh; display: flex; align-items: center; padding: 2rem;">
    <div class="container">
        <div style="max-width: 500px; margin: 0 auto;">
            <div class="card">
                <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary-color);">회원가입</h2>
                
                <form method="POST" action="/auth/signup">
                    <div class="form-group">
                        <label for="email">이메일</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="name">이름</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">비밀번호</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password_confirm">비밀번호 확인</label>
                        <input type="password" id="password_confirm" name="password_confirm" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="agree" style="display: flex; gap: 0.5rem; align-items: center;">
                            <input type="checkbox" id="agree" name="agree" style="width: auto;" required>
                            <span>이용약관 및 개인정보처리방침에 동의합니다</span>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                        회원가입
                    </button>
                </form>
                
                <hr style="margin: 2rem 0; border: none; border-top: 1px solid var(--border-color);">
                
                <!-- Microsoft OAuth 가입 -->
                <button class="btn" style="width: 100%; background: #0078d4; color: white; margin-bottom: 1rem;">
                    🔵 Microsoft로 가입하기
                </button>
                
                <div style="text-align: center; margin-top: 2rem;">
                    <p>이미 계정이 있으신가요? <a href="/auth/login" style="color: var(--primary-color); text-decoration: none; font-weight: bold;">로그인</a></p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
